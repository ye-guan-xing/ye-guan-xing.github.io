<script>
  (async () => {
    const indexCountEle = document.querySelector(".waline-index-count");
    const walineUrl =
      "https:\/\/www.acyeapp.top".replace(
        /\/$/,
        "",
      );
    if (!walineUrl) return;

    const walineNormalizePath = (p) => {
      let s = p && String(p).trim() ? p : "/";
      try {
        let prev;
        do {
          prev = s;
          s = decodeURIComponent(s);
        } while (s !== prev);
      } catch (_) {}
      return s;
    };

    const pageCountEles = document.querySelectorAll(".waline-pageview-count");
    const pagePathNames = Array.from(pageCountEles).map((item) =>
      item.getAttribute("data-path"),
    );

    const commentCountEles = document.querySelectorAll(".waline-comment-count");

    const WALINE_PATH_CHUNK = 8;

    const getViewCount = async (urlList) => {
      if (!urlList.length) return [];
      const normalized = urlList.map(walineNormalizePath);
      const out = [];
      for (let i = 0; i < normalized.length; i += WALINE_PATH_CHUNK) {
        const slice = normalized.slice(i, i + WALINE_PATH_CHUNK);
        const url =
          walineUrl +
          "/api/article/?path=" +
          encodeURIComponent(slice.join(","));
        try {
          const res = await fetch(url);
          const json = await res.json();
          if (json.errno === 0 && Array.isArray(json.data)) {
            out.push(...json.data.map((item) => item.time));
          } else {
            for (let j = 0; j < slice.length; j++) out.push(0);
          }
        } catch (_) {
          for (let j = 0; j < slice.length; j++) out.push(0);
        }
      }
      return out;
    };

    const addViewCount = async (pathname) => {
      try {
        const res = await fetch(walineUrl + "/api/article", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ path: pathname }),
        });
        const json = await res.json();
        return json.errno === 0 ? json.data[0].time : 0;
      } catch (_) {
        return 0;
      }
    };

    const isArticlePage = document.body.classList.contains("article-page");

    if (isArticlePage && pagePathNames.length) {
      const currentPath = pagePathNames[0];
      const view = await addViewCount(currentPath);
      if (pageCountEles[0]) pageCountEles[0].innerText = view;
    } else if (pagePathNames.length) {
      const views = await getViewCount(pagePathNames);
      views.forEach((value, idx) => {
        if (pageCountEles[idx]) pageCountEles[idx].innerText = value;
      });
    }

    if (commentCountEles.length && !document.querySelector("#waline")) {
      const { commentCount } = await import(
        "https://unpkg.com/@waline/client@v3/dist/comment.js",
      );
      commentCount({ serverURL: walineUrl });
    }

    if (indexCountEle) {
      const last = Number(localStorage.getItem("lastVisitTime")) || 0;
      const cached = localStorage.getItem("indexCount");
      const now = Date.now();
      if (!last || now - last >= 3600000) {
        const data = await getViewCount(["/"]);
        const count = data[0] || 0;
        localStorage.setItem("indexCount", String(count));
        localStorage.setItem("lastVisitTime", String(now));
        indexCountEle.innerText = String(count);
      } else {
        indexCountEle.innerText = cached || "0";
      }
    }
  })();
</script>

        return new Promise((resolve, reject) => {
            const tag = type === "css"
                ? Object.assign(document.createElement("link"), { rel: "stylesheet", href: url })
                : Object.assign(document.createElement("script"), { src: url });

            tag.onload = () => resolve(url);
            tag.onerror = () => reject(new Error(`资源加载失败: ${url}`));
            document.head.appendChild(tag);
        });
    }
